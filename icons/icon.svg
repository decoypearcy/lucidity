<svg viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="bg" cx="50%" cy="40%" r="72%">
      <stop offset="0%" stop-color="#2c2418"/>
      <stop offset="52%" stop-color="#201d17"/>
      <stop offset="100%" stop-color="#1a1a1a"/>
    </radialGradient>
    <linearGradient id="moon" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f3e8d2"/>
      <stop offset="100%" stop-color="#c9a96e"/>
    </linearGradient>
    <linearGradient id="lid" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#dabf88"/>
      <stop offset="100%" stop-color="#a07840"/>
    </linearGradient>
    <radialGradient id="halo" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#c9a96e" stop-opacity="0.30"/>
      <stop offset="100%" stop-color="#c9a96e" stop-opacity="0"/>
    </radialGradient>
    <clipPath id="eye">
      <path d="M 92 256 Q 256 138 420 256 Q 256 374 92 256 Z"/>
    </clipPath>
  </defs>

  <rect width="512" height="512" fill="url(#bg)"/>
  <circle cx="256" cy="252" r="170" fill="url(#halo)"/>

  <!-- dark eye interior -->
  <path d="M 92 256 Q 256 138 420 256 Q 256 374 92 256 Z" fill="#141210"/>

  <!-- crescent moon iris, clipped to the eye -->
  <g clip-path="url(#eye)">
    <circle cx="250" cy="256" r="78" fill="url(#moon)"/>
    <circle cx="288" cy="232" r="70" fill="#141210"/>
  </g>

  <!-- open-eye almond outline -->
  <path d="M 92 256 Q 256 138 420 256 Q 256 374 92 256 Z"
        fill="none" stroke="url(#lid)" stroke-width="17" stroke-linejoin="round"/>

  <!-- dream sparkle -->
  <path d="M 356 150
           C 358 169 366 177 385 179
           C 366 181 358 189 356 208
           C 354 189 346 181 327 179
           C 346 177 354 169 356 150 Z"
        fill="#f3e8d2"/>
  <circle cx="314" cy="200" r="4.5" fill="#f3e8d2" opacity="0.8"/>
</svg>
